<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --bg2: #1c1c1e;
    --bg3: #2c2c2e;
    --bg-green: #162316;
    --text: #f5f5f7;
    --text2: #aeaeb2;
    --text3: #6e6e73;
    --text4: #3a3a3c;
    --purple: #bf5af2;
    --blue: #5e9ce6;
    --indigo: #5e5ce6;
    --green: #30d158;
    --border: rgba(255,255,255,0.07);
    --r: 14px;
    --r-sm: 10px;
  }

  html { background: var(--bg); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app { max-width: 720px; margin: 0 auto; padding-bottom: 80px; }

  /* ── STICKY HEADER ─────── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,10,0.9);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border-bottom: 0.5px solid var(--border);
    padding: 32px 24px 14px;
  }

  .hrow1 { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 14px; }
  .htitle h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .htitle p { font-size: 12px; color: var(--text3); margin-top: 3px; }
  .view-toggle {
    display: flex; gap: 3px; background: var(--bg2); border-radius: 10px; padding: 3px;
    border: 0.5px solid var(--border);
  }
  .vbtn {
    padding: 5px 12px; border-radius: 8px; border: none; font-size: 12px;
    font-weight: 500; cursor: pointer; font-family: inherit; transition: all 0.15s;
    background: transparent; color: var(--text3);
  }
  .vbtn.on { background: var(--indigo); color: #fff; }

  /* progress */
  .prog-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .bar-track { flex: 1; background: var(--bg3); border-radius: 100px; height: 5px; overflow: hidden; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--indigo), var(--purple)); border-radius: 100px; transition: width .5s cubic-bezier(.4,0,.2,1); }
  .pct { font-size: 12px; color: var(--text3); flex-shrink: 0; min-width: 34px; text-align: right; }

  .stats { display: flex; gap: 8px; }
  .stat { flex: 1; background: var(--bg2); border-radius: var(--r-sm); padding: 9px 12px; border: 0.5px solid var(--border); }
  .stat-v { font-size: 20px; font-weight: 600; letter-spacing: -.4px; }
  .stat-l { font-size: 10px; color: var(--text3); margin-top: 1px; text-transform: uppercase; letter-spacing: .3px; }

  /* ── NAV (month / week) ── */
  .nav-bar { padding: 10px 0 0; }
  .nav-scroll { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
  .nav-scroll::-webkit-scrollbar { display: none; }
  .nbtn {
    flex-shrink: 0; padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--border);
    font-size: 11.5px; font-weight: 500; cursor: pointer; transition: all .15s;
    background: transparent; color: var(--text3); font-family: inherit; white-space: nowrap;
  }
  .nbtn:hover { color: var(--text); border-color: rgba(255,255,255,.18); }
  .nbtn.on { background: var(--indigo); color: #fff; border-color: transparent; }
  .nbtn.partial { border-color: rgba(94,92,230,.5); color: var(--indigo); }
  .nbtn.full { background: rgba(48,209,88,.12); border-color: rgba(48,209,88,.3); color: var(--green); }

  /* ── BODY ──────────────── */
  .body { padding: 16px 16px 0; }

  /* completion */
  .done-banner { display: none; margin-bottom: 16px; background: linear-gradient(135deg,#1a1a3e,#2a1040); border: 1px solid rgba(94,92,230,.5); border-radius: var(--r); padding: 20px; text-align: center; }
  .done-banner.show { display: block; }
  .done-banner h2 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .done-banner p { font-size: 13px; color: var(--text3); }

  /* ── WEEK VIEW ─────────── */
  .week-block { margin-bottom: 20px; }

  .week-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px; padding: 0 2px;
  }
  .week-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .6px; }
  .week-dots { display: flex; gap: 4px; }
  .wdot { width: 7px; height: 7px; border-radius: 50%; background: var(--bg3); transition: background .2s; }
  .wdot.done { background: var(--green); }
  .wdot.today { background: var(--indigo); }
  .week-pct { font-size: 11px; color: var(--text3); }

  /* week progress bar */
  .week-bar { height: 3px; background: var(--bg3); border-radius: 100px; overflow: hidden; margin-bottom: 8px; }
  .week-bar-fill { height: 100%; background: linear-gradient(90deg, var(--indigo), var(--purple)); border-radius: 100px; transition: width .4s; }
  .week-bar-fill.complete { background: linear-gradient(90deg, var(--green), #25a244); }

  /* day cards in week */
  .week-days { display: flex; flex-direction: column; gap: 4px; }

  .day {
    background: var(--bg2); border-radius: 12px; border: 0.5px solid var(--border);
    overflow: hidden; transition: background .2s;
  }
  .day.done { background: var(--bg-green); border-color: rgba(48,209,88,.12); }
  .day.today { border-color: var(--indigo); border-width: 1px; }

  .day-row {
    display: flex; align-items: center; padding: 11px 13px; gap: 11px;
    cursor: pointer; user-select: none;
  }

  .check {
    width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--text4);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: all .2s; cursor: pointer;
  }
  .day.done .check { background: var(--green); border-color: var(--green); }
  .check svg { width: 12px; height: 12px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; opacity: 0; transition: opacity .15s; }
  .day.done .check svg { opacity: 1; }

  .day-info { flex: 1; min-width: 0; }
  .day-top { display: flex; align-items: center; gap: 7px; margin-bottom: 2px; }
  .day-date { font-size: 13px; font-weight: 500; }
  .today-pill { font-size: 10px; font-weight: 600; background: var(--indigo); color: #fff; border-radius: 6px; padding: 1px 6px; }
  .day-refs { font-size: 12px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .at { color: var(--purple); }
  .nt { color: var(--blue); }

  .chevron { flex-shrink: 0; color: var(--text4); transition: transform .2s; }
  .chevron svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }
  .day.open .chevron { transform: rotate(180deg); }

  .day-detail { display: none; padding: 0 13px 12px 46px; }
  .day.open .day-detail { display: block; }

  .ref-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .ref-group .ref-label { font-size: 10px; font-weight: 600; letter-spacing: .5px; color: var(--text3); text-transform: uppercase; margin-bottom: 3px; }
  .ref-pill { display: inline-block; font-size: 12px; padding: 4px 10px; border-radius: 8px; }
  .ref-pill.at { background: rgba(191,90,242,.1); color: var(--purple); }
  .ref-pill.nt { background: rgba(94,156,230,.1); color: var(--blue); }

  .note-box { background: #111; border-radius: 9px; border: 0.5px solid var(--border); padding: 9px 11px; }
  .note-box textarea { width: 100%; background: transparent; border: none; outline: none; font-size: 13px; color: var(--text); resize: none; font-family: inherit; line-height: 1.6; min-height: 60px; }
  .note-box textarea::placeholder { color: var(--text4); }
  .note-hint { font-size: 10px; color: var(--text4); margin-top: 4px; transition: color .3s; }
  .note-hint.flash { color: var(--green); }

  /* ── MONTH VIEW ────────── */
  .month-days { display: flex; flex-direction: column; gap: 5px; }

  @media (max-width: 480px) {
    .header { padding: 24px 16px 12px; }
    .htitle h1 { font-size: 22px; }
    .body { padding: 12px 10px 0; }
    .stats { gap: 6px; }
    .stat-v { font-size: 18px; }
    .day-detail { padding-left: 42px; }
  }
</style>
</head>

  {d:"2027-06-01",j:"Mar",at:"Psaumes 148–150",nt:"Apocalypse 22.6-21"},
];

const TOTAL = PLAN.length;
const TODAY = "2026-06-14";

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let st = {};
try { const r = localStorage.getItem("bible_2026_full"); if(r) st = JSON.parse(r); } catch(e){}
function save() { try { localStorage.setItem("bible_2026_full", JSON.stringify(st)); } catch(e){} }

let view = "week"; // "week" | "month"
let curKey = null;   // current week key or month key
let openMap = {};

// ═══════════════════════════════════════════
// BUILD WEEK GROUPS
// ═══════════════════════════════════════════
// Each week: Mon–Sun (ISO week), but we group by plan continuity
function isoWeekKey(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  // Get Monday of the week
  const day = d.getDay(); // 0=Sun
  const diff = (day === 0) ? -6 : 1 - day;
  const mon = new Date(d);
  mon.setDate(d.getDate() + diff);
  return mon.toISOString().slice(0,10); // "2026-06-01"
}

// Group plan into weeks
const weekMap = new Map(); // weekKey -> [days]
for(const p of PLAN) {
  const wk = isoWeekKey(p.d);
  if(!weekMap.has(wk)) weekMap.set(wk, []);
  weekMap.get(wk).push(p);
}
const WEEKS = [...weekMap.entries()].sort((a,b)=>a[0].localeCompare(b[0])).map(([k,days])=>({k,days}));

// Month groups
const monthMap = new Map();
for(const p of PLAN) {
  const mk = p.d.slice(0,7);
  if(!monthMap.has(mk)) monthMap.set(mk,{k:mk, days:[]});
  monthMap.get(mk).days.push(p);
}
const MONTHS_ARR = [...monthMap.values()].sort((a,b)=>a.k.localeCompare(b.k));

const MONTH_NAMES = {
  "01":"Janvier","02":"Février","03":"Mars","04":"Avril",
  "05":"Mai","06":"Juin","07":"Juillet","08":"Août",
  "09":"Septembre","10":"Octobre","11":"Novembre","12":"Décembre"
};

function fmtDate(s) { const[,m,d]=s.split("-"); return `${d}/${m}`; }
function fmtMonth(mk) { const[y,m]=mk.split("-"); return `${MONTH_NAMES[m]} ${y.slice(2)}`; }
function fmtWeekLabel(wk) {
  // "S1 · 1–7 juin"
  const days = weekMap.get(wk);
  const first = days[0].d, last = days[days.length-1].d;
  const [,fm,fd] = first.split("-"); const [,lm,ld] = last.split("-");
  const range = fm===lm ? `${parseInt(fd)}–${parseInt(ld)} ${MONTH_NAMES[fm].toLowerCase()}`
    : `${parseInt(fd)} ${MONTH_NAMES[fm].slice(0,3).toLowerCase()}–${parseInt(ld)} ${MONTH_NAMES[lm].slice(0,3).toLowerCase()}`;
  return range;
}
function weekSerial(wk) {
  return WEEKS.findIndex(w=>w.k===wk)+1;
}

// ═══════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════
function getStreak() {
  let s=0, prev=null;
  for(const p of [...PLAN].sort((a,b)=>b.d.localeCompare(a.d))) {
    if(!st[p.d]?.done) break;
    if(prev && (new Date(prev)-new Date(p.d))/86400000!==1) break;
    s++; prev=p.d;
  }
  return s;
}

function countFullWeeks() {
  return WEEKS.filter(w=>w.days.every(p=>st[p.d]?.done)).length;
}

function renderProgress() {
  const done = PLAN.filter(p=>st[p.d]?.done).length;
  const pct = Math.round(done/TOTAL*100);
  document.getElementById("bar").style.width = pct+"%";
  document.getElementById("pct").textContent = pct+"%";
  document.getElementById("s-done").textContent = done;
  document.getElementById("s-left").textContent = TOTAL-done;
  document.getElementById("s-streak").textContent = getStreak();
  document.getElementById("s-weeks").textContent = countFullWeeks();
  document.getElementById("done-banner").classList.toggle("show", done===TOTAL);
  // refresh nav badges
  renderNav();
}

// ═══════════════════════════════════════════
// VIEW TOGGLE
// ═══════════════════════════════════════════
function setView(v) {
  view = v;
  document.getElementById("vbtn-week").classList.toggle("on", v==="week");
  document.getElementById("vbtn-month").classList.toggle("on", v==="month");
  // pick sensible default key
  if(v==="week") {
    const todayWk = isoWeekKey(TODAY);
    curKey = WEEKS.find(w=>w.k===todayWk) ? todayWk : WEEKS[0].k;
  } else {
    curKey = TODAY.slice(0,7);
  }
  renderNav();
  renderContent();
}

// ═══════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════
function renderNav() {
  const nav = document.getElementById("nav-scroll");
  if(view==="week") {
    nav.innerHTML = WEEKS.map((w,i)=>{
      const allDone = w.days.every(p=>st[p.d]?.done);
      const anyDone = w.days.some(p=>st[p.d]?.done);
      const cls = allDone?"full":anyDone?"partial":"";
      return `<button class="nbtn${w.k===curKey?" on":""} ${cls}" data-k="${w.k}">S${i+1}</button>`;
    }).join("");
  } else {
    nav.innerHTML = MONTHS_ARR.map(m=>{
      const allDone = m.days.every(p=>st[p.d]?.done);
      const anyDone = m.days.some(p=>st[p.d]?.done);
      const cls = allDone?"full":anyDone?"partial":"";
      const [y,mo]=m.k.split("-");
      return `<button class="nbtn${m.k===curKey?" on":""} ${cls}" data-k="${m.k}">${MONTH_NAMES[mo].slice(0,4)} ${y.slice(2)}</button>`;
    }).join("");
  }
  nav.querySelectorAll(".nbtn").forEach(btn=>{
    btn.onclick = () => { curKey=btn.dataset.k; renderNav(); renderContent(); };
  });
  // scroll active into view
  const active = nav.querySelector(".on");
  if(active) requestAnimationFrame(()=>active.scrollIntoView({inline:"center",behavior:"smooth"}));
}

// ═══════════════════════════════════════════
// DAY CARD HTML
// ═══════════════════════════════════════════
function dayCardHTML(p) {
  const done = !!st[p.d]?.done;
  const isToday = p.d===TODAY;
  const isOpen = !!openMap[p.d];
  const note = st[p.d]?.note||"";
  const ntLine = p.nt ? ` &nbsp;·&nbsp; <span class="nt">NT</span> ${p.nt}`:"";
  return `<div class="day${done?" done":""}${isToday?" today":""}${isOpen?" open":""}" id="c-${p.d}">
    <div class="day-row">
      <div class="check" data-ck="${p.d}"><svg viewBox="0 0 12 10"><polyline points="1.5,5 4.5,8.5 10.5,1.5"/></svg></div>
      <div class="day-info" data-ex="${p.d}">
        <div class="day-top">
          <span class="day-date">${fmtDate(p.d)} · ${p.j}</span>
          ${isToday?'<span class="today-pill">Aujourd\'hui</span>':""}
        </div>
        <div class="day-refs"><span class="at">AT</span> ${p.at}${ntLine}</div>
      </div>
      <div class="chevron" data-ex="${p.d}"><svg viewBox="0 0 14 14"><polyline points="2,4 7,9 12,4"/></svg></div>
    </div>
    <div class="day-detail">
      <div class="ref-pills">
        <div class="ref-group"><div class="ref-label">Ancien Testament</div><span class="ref-pill at">${p.at}</span></div>
        ${p.nt?`<div class="ref-group"><div class="ref-label">Nouveau Testament</div><span class="ref-pill nt">${p.nt}</span></div>`:""}
      </div>
      <div class="note-box">
        <textarea placeholder="Ce qui m'a marqué…" data-nt="${p.d}" rows="3">${note}</textarea>
        <div class="note-hint" id="nh-${p.d}">Notes sauvegardées automatiquement</div>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════
// RENDER CONTENT
// ═══════════════════════════════════════════
function renderContent() {
  const c = document.getElementById("content");

  if(view==="week") {
    const w = WEEKS.find(wk=>wk.k===curKey);
    if(!w) { c.innerHTML=""; return; }
    const serial = weekSerial(curKey);
    const doneCnt = w.days.filter(p=>st[p.d]?.done).length;
    const total = w.days.length;
    const pct = Math.round(doneCnt/total*100);
    const complete = doneCnt===total;

    const dotsHTML = w.days.map(p=>{
      const cls = p.d===TODAY?"today":st[p.d]?.done?"done":"";
      return `<div class="wdot${cls?" "+cls:""}"></div>`;
    }).join("");

    c.innerHTML = `<div class="week-block">
      <div class="week-header">
        <span class="week-title">Semaine ${serial} · ${fmtWeekLabel(curKey)}</span>
        <div class="week-dots">${dotsHTML}</div>
        <span class="week-pct">${doneCnt}/${total}</span>
      </div>
      <div class="week-bar"><div class="week-bar-fill${complete?" complete":""}" style="width:${pct}%"></div></div>
      <div class="week-days">${w.days.map(dayCardHTML).join("")}</div>
    </div>`;

  } else {
    const mo = MONTHS_ARR.find(m=>m.k===curKey);
    if(!mo) { c.innerHTML=""; return; }
    c.innerHTML = `<div class="month-days">${mo.days.map(dayCardHTML).join("")}</div>`;
  }

  bindEvents();

  // scroll to today if present
  const todayEl = document.getElementById("c-"+TODAY);
  if(todayEl) requestAnimationFrame(()=>todayEl.scrollIntoView({behavior:"smooth",block:"center"}));
}

// ═══════════════════════════════════════════
// BIND EVENTS
// ═══════════════════════════════════════════
function bindEvents() {
  document.querySelectorAll("[data-ck]").forEach(el=>{
    el.onclick = e=>{
      e.stopPropagation();
      const d=el.dataset.ck;
      if(!st[d]) st[d]={};
      st[d].done=!st[d].done;
      save(); renderProgress();
      // patch card class
      const card=document.getElementById("c-"+d);
      if(card) card.classList.toggle("done",st[d].done);
      // patch week bar / dots
      if(view==="week") refreshWeekBar();
    };
  });

  document.querySelectorAll("[data-ex]").forEach(el=>{
    el.onclick=()=>{
      const d=el.dataset.ex;
      openMap[d]=!openMap[d];
      const card=document.getElementById("c-"+d);
      if(card) card.classList.toggle("open",openMap[d]);
    };
  });

  document.querySelectorAll("[data-nt]").forEach(ta=>{
    let timer;
    ta.oninput=()=>{
      const d=ta.dataset.nt;
      if(!st[d]) st[d]={};
      st[d].note=ta.value; save();
      const hint=document.getElementById("nh-"+d);
      if(hint){hint.textContent="Sauvegardé ✓";hint.classList.add("flash");}
      clearTimeout(timer);
      timer=setTimeout(()=>{if(hint){hint.textContent="Notes sauvegardées automatiquement";hint.classList.remove("flash");}},1500);
    };
  });
}

function refreshWeekBar() {
  const w = WEEKS.find(wk=>wk.k===curKey);
  if(!w) return;
  const doneCnt = w.days.filter(p=>st[p.d]?.done).length;
  const pct = Math.round(doneCnt/w.days.length*100);
  const fill = document.querySelector(".week-bar-fill");
  if(fill){ fill.style.width=pct+"%"; fill.classList.toggle("complete",doneCnt===w.days.length); }
  // dots
  document.querySelectorAll(".wdot").forEach((dot,i)=>{
    const p=w.days[i];
    dot.className="wdot"+(p.d===TODAY?" today":st[p.d]?.done?" done":"");
  });
  const cnt=document.querySelector(".week-pct");
  if(cnt) cnt.textContent=`${doneCnt}/${w.days.length}`;
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
const todayWk = isoWeekKey(TODAY);
curKey = WEEKS.find(w=>w.k===todayWk)?.k || WEEKS[0].k;
renderProgress();
renderNav();
renderContent();
</script>
